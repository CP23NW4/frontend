name: Frontend CI/CD

on:
  push:
    branches:
      - frontend-punch

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v2
      
    - name: Setup Node.js
      uses: actions/setup-node@v2
      with:
        node-version: '20'
        
    - name: Install dependencies
      run: npm install
      
    - name: Build and test
      run: npm run build
      
    - name: Deploy to local
      run: |
        # Use your deployment command here, e.g., serve -s build
        npx serve dist &

